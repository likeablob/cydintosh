; PlatformIO Project Configuration File
; ESP32-CYD (Cheap Yellow Display) Mac Plus Emulator
; Using CYD2USB (ESP32, not ESP32-S3)

[env]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.37
board = esp32dev
framework = espidf
board_build.partitions = partitions.csv

build_flags = 
    -Iinclude
    -DUSE_INTERNAL_RAM
    -DUMAC_MEMSIZE=128
    -DDISP_WIDTH=240
    -DDISP_HEIGHT=320
    -DMUSASHI_CNF=\"m68kconf.h\"
    -DENABLE_DASM=0
    ; CYD Display settings
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    ; Touch screen pins
    -DTOUCH_MOSI=32
    -DTOUCH_MISO=39
    -DTOUCH_CLK=25
    -DTOUCH_CS=33

[env:cyd2usb]
build_flags =
	${env.build_flags}
	-DCYD_SPI_CLOCK_HZ=80000000
	-DCYD_RGB_ORDER=LCD_RGB_ELEMENT_ORDER_BGR

[env:cyd]
build_flags =
	${env.build_flags}
	-DCYD_MIRROR_DISPLAY
	-DCYD_SPI_CLOCK_HZ=40000000
	-DCYD_RGB_ORDER=LCD_RGB_ELEMENT_ORDER_RGB
